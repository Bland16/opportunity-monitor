<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Opportunity Monitor</title>
<style>
  :root { color-scheme: light; --blue:#2563eb; --blue-d:#1d4ed8; --ink:#1f2937;
          --muted:#64748b; --line:#e2e8f0; --bg:#f4f7fc; --card:#ffffff; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.55 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         background: var(--bg); color: var(--ink); }
  header { background: #fff; border-bottom: 1px solid var(--line); padding: 16px 24px 0; }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  header h1 { margin: 0; font-size: 20px; color: var(--blue-d); }
  header .sub { color: var(--muted); font-size: 13px; }
  nav.tabs { display: flex; gap: 4px; margin-top: 14px; }
  nav.tabs button { font: inherit; font-weight: 600; border: none; background: none; cursor: pointer;
                    color: var(--muted); padding: 9px 16px; border-bottom: 3px solid transparent; }
  nav.tabs button.active { color: var(--blue-d); border-bottom-color: var(--blue); }
  main { max-width: 860px; margin: 0 auto; padding: 22px 16px 60px; }
  .page { display: none; }
  .page.active { display: block; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px;
          padding: 18px; margin-bottom: 16px; box-shadow: 0 1px 2px rgba(15,23,42,.04); }
  .card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .card-head h2 { margin: 0; font-size: 17px; }
  .badge { font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 999px; letter-spacing: .3px; }
  .badge.saved { background: #e6efff; color: var(--blue-d); border: 1px solid #c7dbff; }
  .badge.draft { background: #fff3d6; color: #92600b; border: 1px solid #f4d58a; }
  .hint { color: var(--muted); font-size: 12.5px; margin: 0 0 12px; }
  label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; text-transform: uppercase;
          letter-spacing: .4px; font-weight: 600; }
  textarea { width: 100%; min-height: 60px; resize: vertical; background: #fff; color: var(--ink);
             border: 1px solid #cbd5e1; border-radius: 8px; padding: 9px 11px; font: inherit; }
  textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
  .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  button.act { font: inherit; font-weight: 600; border: 1px solid transparent; border-radius: 8px;
               padding: 8px 15px; cursor: pointer; }
  button.act:disabled { opacity: .55; cursor: default; }
  .primary { background: var(--blue); color: #fff; }
  .primary:hover:enabled { background: var(--blue-d); }
  .ghost { background: #fff; color: #334155; border-color: #cbd5e1; }
  .run { background: var(--blue); color: #fff; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .chip { font-size: 12px; border: 1px solid #cfe0ff; background: #f2f7ff; color: var(--blue-d);
          border-radius: 999px; padding: 3px 10px; cursor: pointer; }
  .chip:hover { background: #e0ecff; }
  .chip-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px;
                font-weight: 600; margin-top: 10px; }
  details.advanced { margin-top: 12px; border-top: 1px dashed var(--line); padding-top: 8px; }
  details.advanced summary { cursor: pointer; color: var(--blue-d); font-size: 13px; font-weight: 600; }
  details.advanced .adv-note { color: var(--muted); font-size: 12px; margin: 6px 0 0; }
  .results { margin-top: 6px; }
  .status { font-size: 13px; color: var(--muted); }
  .note { font-size: 12.5px; color: var(--muted); background: #f8fafc; border: 1px solid var(--line);
          border-radius: 8px; padding: 10px 12px; }
  .err { color: #b42318; background: #fef3f2; border: 1px solid #fecdca; border-radius: 8px;
         font-size: 12.5px; margin-top: 8px; padding: 8px 10px; white-space: pre-wrap; }
  ul.opps { list-style: none; margin: 8px 0 0; padding: 0; }
  ul.opps li { padding: 10px 0; border-top: 1px solid var(--line); }
  ul.opps a { color: var(--blue-d); text-decoration: none; font-weight: 600; }
  ul.opps a:hover { text-decoration: underline; }
  .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
</style>
</head>
<body>
<header>
  <div class="brand"><h1>Opportunity Monitor</h1><span class="sub">read-only discovery · runs entirely in your browser</span></div>
  <nav class="tabs">
    <button id="tab-config" class="active" onclick="showPage('config')">Configure</button>
    <button id="tab-output" onclick="showPage('output')">Results</button>
  </nav>
</header>
<main>
  <section id="config-page" class="page active"></section>
  <section id="output-page" class="page"></section>
</main>

<script>
"use strict";

// ---- Category metadata + keyless suggestions ----
const META = [
  { key: "jobs", title: "Jobs", hasCompanies: true,
    hint: "Live company job boards (Greenhouse / Lever / Ashby). Add role keywords; pick companies under Advanced.",
    kwSuggest: ["engineer","intern","new grad","backend","frontend","data","product","design","machine learning","security"],
    coSuggest: ["stripe","spotify","ramp","figma","notion","databricks","airbnb","coinbase","plaid","robinhood","doordash","brex"] },
  { key: "programs", title: "Programs", hasCompanies: false,
    hint: "Curated GitHub lists of fellowships & programs. Keywords, e.g. fellowship, research, scholars.",
    kwSuggest: ["fellowship","research","scholars","diversity","mentorship","reu","insight","externship"] },
  { key: "leadership", title: "Leadership", hasCompanies: false,
    hint: "Curated lists for leadership / rotational / early-talent programs.",
    kwSuggest: ["leadership","rotational","ldp","bold","explore","early talent","development"] },
];

// Curated GitHub list READMEs (raw markdown) for programs + leadership.
const PROGRAM_REPOS = [
  "https://raw.githubusercontent.com/Julian048/CS-Everything-but-Internships/main/README.md",
  "https://raw.githubusercontent.com/LuisaE/opportunities/master/README.md",
  "https://raw.githubusercontent.com/zapplyjobs/underclassmen-internships/main/README.md",
];

const UNFILTERED_CAP = 200;

const DEFAULTS = {
  jobs: { companies: ["stripe","spotify","ramp"], keywords: ["engineer"] },
  programs: { companies: [], keywords: ["fellowship","research"] },
  leadership: { companies: [], keywords: ["leadership","rotational"] },
};

// ===================== Scrapers (pure browser fetch) =====================

async function getJSON(url) {
  const res = await fetch(url);
  if (!res.ok) { const e = new Error("HTTP " + res.status); e.status = res.status; throw e; }
  return res.json();
}
async function getText(url) {
  const res = await fetch(url);
  if (!res.ok) { const e = new Error("HTTP " + res.status); e.status = res.status; throw e; }
  return res.text();
}

function matches(opp, keywords) {
  if (!keywords.length) return true;
  const t = (opp.title + " " + opp.desc).toLowerCase();
  return keywords.some(k => t.includes(k.toLowerCase()));
}

function msToDate(ms) {
  if (typeof ms !== "number") return "";
  try { return new Date(ms).toISOString().slice(0, 10); } catch { return ""; }
}

// -- ATS boards (a 404 means the company isn't on that board → skip quietly) --
async function scrapeGreenhouse(c) {
  try {
    const d = await getJSON(`https://boards-api.greenhouse.io/v1/boards/${c}/jobs`);
    return (d.jobs || []).map(j => ({
      title: (j.title || "").trim(), url: j.absolute_url || "",
      source: "greenhouse:" + c, date: j.updated_at || "",
      desc: (c + " — " + ((j.location && j.location.name) || "")).replace(/ — $/, ""),
    }));
  } catch (e) { if (e.status === 404) return []; throw e; }
}
async function scrapeLever(c) {
  try {
    const d = await getJSON(`https://api.lever.co/v0/postings/${c}?mode=json`);
    return (Array.isArray(d) ? d : []).map(p => ({
      title: (p.text || "").trim(), url: p.hostedUrl || "",
      source: "lever:" + c, date: msToDate(p.createdAt),
      desc: (c + " — " + ((p.categories && p.categories.location) || "")).replace(/ — $/, ""),
    }));
  } catch (e) { if (e.status === 404) return []; throw e; }
}
async function scrapeAshby(c) {
  try {
    const d = await getJSON(`https://api.ashbyhq.com/posting-api/job-board/${c}`);
    return (d.jobs || []).map(j => ({
      title: (j.title || "").trim(), url: j.jobUrl || j.applyUrl || "",
      source: "ashby:" + c, date: j.publishedAt || "",
      desc: (c + " — " + (j.location || "")).replace(/ — $/, ""),
    }));
  } catch (e) { if (e.status === 404) return []; throw e; }
}

async function runJobs(companies, keywords) {
  const tasks = [];
  for (const raw of companies) {
    const c = raw.trim().toLowerCase();
    if (!c) continue;
    tasks.push(scrapeGreenhouse(c), scrapeLever(c), scrapeAshby(c));
  }
  const settled = await Promise.allSettled(tasks);
  const results = [], errors = [], seen = new Set();
  for (const s of settled) {
    if (s.status === "fulfilled") {
      for (const opp of s.value) {
        const key = opp.url || (opp.source + "|" + opp.title);
        if (seen.has(key)) continue;
        seen.add(key);
        if (matches(opp, keywords)) results.push(opp);
      }
    } else {
      errors.push(String((s.reason && s.reason.message) || s.reason));
    }
  }
  return { results, errors: [...new Set(errors)] };
}

// -- Curated GitHub list scraper --
const LINK_RE = /\[([^\]]+)\]\((https?:\/\/[^)]+)\)/;
const LINK_RE_G = /\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g;
const clean = (s) => s.replace(/<[^>]+>/g, "").replace(/[*`]/g, "").trim();

function repoLabel(url) {
  const parts = url.replace("https://raw.githubusercontent.com/", "").split("/");
  return parts.length >= 2 ? parts[0] + "/" + parts[1] : url;
}
function parseMarkdown(text, label) {
  const out = [];
  for (const rawLine of text.split(/\r?\n/)) {
    const line = rawLine.trim();
    if (!line.startsWith("|")) continue;
    if (/^[|\-:\s]+$/.test(line)) continue;         // separator row
    const m = line.match(LINK_RE);
    if (!m) continue;
    const title = clean(m[1]);
    if (!title) continue;
    const cells = line.replace(/^\|/, "").split("|").map(s => s.trim()).filter(Boolean);
    let desc = clean(cells.join(" · ")).replace(LINK_RE_G, "$1");
    out.push({ title, url: m[2], source: "github:" + label, date: "", desc: desc.slice(0, 300) });
  }
  return out;
}
async function runList(repos, keywords) {
  const results = [], errors = [], seen = new Set();
  for (const repo of repos) {
    const label = repoLabel(repo);
    let text;
    try { text = await getText(repo); }
    catch (e) { errors.push("github:" + label + ": " + e.message); continue; }
    for (const opp of parseMarkdown(text, label)) {
      if (!matches(opp, keywords)) continue;
      const key = opp.url || opp.title;
      if (seen.has(key)) continue;
      seen.add(key);
      results.push(opp);
      if (!keywords.length && results.length >= UNFILTERED_CAP) return { results, errors };
    }
  }
  return { results, errors };
}

function runCategory(key, companies, keywords) {
  if (key === "jobs") return runJobs(companies, keywords);
  return runList(PROGRAM_REPOS, keywords);
}

// ===================== Config (localStorage) =====================

const STORE = "opp-monitor-config-v1";
let saved = {};

function loadSaved() {
  const raw = localStorage.getItem(STORE);
  if (!raw) return JSON.parse(JSON.stringify(DEFAULTS));
  let s = {};
  try { s = JSON.parse(raw) || {}; } catch { s = {}; }
  const out = {};
  for (const m of META) {
    const c = s[m.key] || {};
    out[m.key] = { companies: c.companies || [], keywords: c.keywords || [] };
  }
  return out;
}
function persist() { localStorage.setItem(STORE, JSON.stringify(saved)); }

// ===================== UI =====================

const el = (tag, props = {}, kids = []) => {
  const n = document.createElement(tag);
  Object.entries(props).forEach(([k, v]) => {
    if (k === "class") n.className = v;
    else if (k === "text") n.textContent = v;
    else n.setAttribute(k, v);
  });
  (Array.isArray(kids) ? kids : [kids]).forEach(c => c && n.appendChild(c));
  return n;
};
const toText = (arr) => (arr || []).join("\n");
const toList = (t) => t.split(/[\n,]/).map(s => s.trim()).filter(Boolean);

function showPage(name) {
  document.getElementById("config-page").classList.toggle("active", name === "config");
  document.getElementById("output-page").classList.toggle("active", name === "output");
  document.getElementById("tab-config").classList.toggle("active", name === "config");
  document.getElementById("tab-output").classList.toggle("active", name === "output");
}

function draftOf(key) {
  const kw = document.getElementById(key + "-kw");
  const co = document.getElementById(key + "-co");
  return { companies: co ? toList(co.value) : [], keywords: kw ? toList(kw.value) : [] };
}
function isDirty(key) {
  const d = draftOf(key), s = saved[key] || { companies: [], keywords: [] };
  return JSON.stringify(d) !== JSON.stringify({ companies: s.companies || [], keywords: s.keywords || [] });
}
function refreshBadge(key) {
  const b = document.getElementById(key + "-badge");
  if (!b) return;
  if (isDirty(key)) { b.textContent = "[UNSAVED DRAFT]"; b.className = "badge draft"; }
  else { b.textContent = "Saved"; b.className = "badge saved"; }
}
function fillFromSaved(key) {
  const s = saved[key] || { companies: [], keywords: [] };
  const kw = document.getElementById(key + "-kw");
  const co = document.getElementById(key + "-co");
  if (kw) kw.value = toText(s.keywords);
  if (co) co.value = toText(s.companies);
  refreshBadge(key);
}
function confirmSave(key) {
  saved[key] = draftOf(key);
  persist();
  fillFromSaved(key);
}

// append a suggestion chip's value to a textarea (deduped)
function addToBox(id, value, key) {
  const box = document.getElementById(id);
  const items = toList(box.value);
  if (!items.includes(value)) items.push(value);
  box.value = items.join("\n");
  refreshBadge(key);
}
function chipRow(labelText, values, boxId, key) {
  const wrap = el("div", { class: "chips" });
  values.forEach(v => {
    const chip = el("span", { class: "chip", text: v });
    chip.addEventListener("click", () => addToBox(boxId, v, key));
    wrap.appendChild(chip);
  });
  return [el("div", { class: "chip-label", text: labelText }), wrap];
}

function configCard(meta) {
  const badge = el("span", { id: meta.key + "-badge", class: "badge saved", text: "Saved" });
  const kids = [
    el("div", { class: "card-head" }, [el("h2", { text: meta.title }), badge]),
    el("p", { class: "hint", text: meta.hint }),
    el("label", { text: "Keywords (one per line or comma-separated)" }),
  ];
  const kw = el("textarea", { id: meta.key + "-kw",
    placeholder: meta.hasCompanies ? "engineer\nintern" : "fellowship\nresearch" });
  kw.addEventListener("input", () => refreshBadge(meta.key));
  kids.push(kw);
  chipRow("Suggestions — click to add", meta.kwSuggest, meta.key + "-kw", meta.key).forEach(n => kids.push(n));

  if (meta.hasCompanies) {
    const co = el("textarea", { id: meta.key + "-co", placeholder: "stripe\nspotify\nramp" });
    co.addEventListener("input", () => refreshBadge(meta.key));
    const advKids = [
      el("summary", { text: "Advanced — target specific companies (optional)" }),
      el("label", { text: "Company board slugs (one per line or comma-separated)" }),
      co,
      el("p", { class: "adv-note",
        text: 'Slug = the name in a board URL, e.g. boards.greenhouse.io/stripe → "stripe". Leave empty to skip.' }),
    ];
    chipRow("Suggestions — click to add", meta.coSuggest, meta.key + "-co", meta.key).forEach(n => advKids.push(n));
    kids.push(el("details", { class: "advanced", id: meta.key + "-adv" }, advKids));
  }

  const save = el("button", { class: "act primary", text: "Confirm & Save" });
  save.addEventListener("click", () => confirmSave(meta.key));
  const cancel = el("button", { class: "act ghost", text: "Cancel" });
  cancel.addEventListener("click", () => fillFromSaved(meta.key));
  kids.push(el("div", { class: "row" }, [save, cancel]));
  return el("div", { class: "card" }, kids);
}

async function runAndRender(key, btn) {
  const out = document.getElementById(key + "-results");
  const label = btn.textContent;
  btn.disabled = true; btn.textContent = "Running…";
  out.innerHTML = "";
  out.appendChild(el("p", { class: "status", text: "Checking live sources…" }));
  const s = saved[key] || { companies: [], keywords: [] };
  let res;
  try { res = await runCategory(key, s.companies, s.keywords); }
  catch (e) { out.innerHTML = ""; out.appendChild(el("p", { class: "status", text: "Failed: " + e })); return; }
  finally { btn.disabled = false; btn.textContent = label; }

  out.innerHTML = "";
  const n = res.results.length;
  out.appendChild(el("p", { class: "status", text: n + " result" + (n === 1 ? "" : "s") }));
  if (res.errors && res.errors.length) {
    out.appendChild(el("div", { class: "err", text: res.errors.join("\n") }));
  }
  const ul = el("ul", { class: "opps" });
  res.results.slice(0, 200).forEach(o => {
    const a = el("a", { href: o.url, target: "_blank", rel: "noopener", text: o.title || o.url });
    const meta = el("div", { class: "meta",
      text: [o.source, o.date, o.desc].filter(Boolean).join("  ·  ") });
    ul.appendChild(el("li", {}, [a, meta]));
  });
  out.appendChild(ul);
}

function outputCard(meta) {
  const run = el("button", { class: "act run", text: "Run ▶" });
  run.addEventListener("click", () => runAndRender(meta.key, run));
  return el("div", { class: "card" }, [
    el("div", { class: "card-head" }, [el("h2", { text: meta.title })]),
    el("p", { class: "hint", text: "Run to fetch live results for your saved keywords." }),
    el("div", { class: "row" }, [run]),
    el("div", { id: meta.key + "-results", class: "results" }),
  ]);
}

function init() {
  saved = loadSaved();
  const cfg = document.getElementById("config-page");
  const out = document.getElementById("output-page");
  META.forEach(m => cfg.appendChild(configCard(m)));
  META.forEach(m => out.appendChild(outputCard(m)));
  out.appendChild(el("div", { class: "card" }, [
    el("div", { class: "note",
      text: "Research (REU / PathwaysToScience) isn't shown here: that site doesn't allow browser access. Use the Python app for the research category." }),
  ]));
  META.forEach(m => fillFromSaved(m.key));
}
init();
</script>
</body>
</html>
